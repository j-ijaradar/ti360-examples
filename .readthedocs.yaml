# Read the Docs configuration — versioned builds of docs/.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    rust: "latest"
  jobs:
    pre_install:
      # build the package (PyO3 core) so autodoc imports the real thing
      - pip install ./py/trafficinsight360

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

python:
  install:
    - requirements: docs/requirements.txt
